apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: diagnosticruns.sre.middleware.io
spec:
  group: sre.middleware.io
  scope: Namespaced
  names:
    plural: diagnosticruns
    singular: diagnosticrun
    kind: DiagnosticRun
    shortNames: [drun]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                profile:
                  type: string
                modules:
                  type: array
                  items:
                    type: string
                mode:
                  type: string
                  enum: [local, ssh, agent, k8sJob]
                targets:
                  type: array
                  items:
                    type: object
                    properties:
                      name: {type: string}
                      address: {type: string}
            status:
              type: object
              properties:
                phase: {type: string}
                runID: {type: string}
                evidenceURI: {type: string}
                summary: {type: string}
